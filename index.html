<script>
        const jsonFileName = 'Procurement_Database.json';
        let globalTenderData = []; 
        let activeRuleKey = null; 
        
        let violationChartObj = null, syndicateChartObj = null, dropoutChartObj = null;
        let timelineChartObj = null, riskPieChartObj = null, agencyChartObj = null;
        let redFlagChartObj = null, singleBidderChartObj = null, riskValuePieChartObj = null;

        const colorPrimary = '#38bdf8';   
        const colorSecondary = '#1e3a8a'; 
        const colorAccent = '#60a5fa';    
        const colorAlert = '#dc2626';     

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#1e3a5f';

        // LEGAL RULE DICTIONARY
        const RULE_MAP = {
            owner: ["e-PG3 ITT 5.14 – Beneficial Ownership Disclosure"],
            monopoly: ["e-PG3 ITT 50.6 – Lack of Effective Competition"],
            split: ["PPA 2006 – Artificial Contract Splitting"],
            cpv: ["EU CPV Regulation (Mismatched Code)"],
            tailored: ["PPR 2008 Rule 98 – Restrictive Qualification Criteria"],
            meeting: ["PPR Schedule – Minimum Tender Preparation Time"],
            outlier: ["World Bank ALB Guideline – Abnormally Low/High Bids"],
            rigging: ["OECD Guidelines for Fighting Bid Rigging"]
        };

        // --- UNIVERSAL NLP HEURISTIC ENGINE FOR ALL AUTHORITIES ---
        function analyzeEligibilityAI(text) {
            if (!text) return false;
            let score = 0;
            let t = text.toLowerCase();
            
            // 1. Overly Specific Decimals (e.g. 15.35 Crore instead of 15 Crore)
            if (/\d+\.\d{2,}/.test(t)) score += 40; 
            
            // 2. Universal Geofencing & Authority Locking (Catches ALL Development Authorities)
            // If they demand experience specifically under RAJUK, CDA, KDA, RDA, CoxDA, GDA, PWD etc.
            if (/\b(rajuk|cda|kda|rda|coxda|gda|pwd|lged|city corporation|rajdhani unnayan|chittagong development|khulna development|rajshahi development|cox\'s bazar development|gazipur development)\b/i.test(t)) {
                score += 30; // Illegal Authority Locking
            }
            if (/(specific area|particular zone|local authority|chattogram|chittagong|dhaka|khulna|rajshahi|gazipur|cox\'s bazar)/i.test(t)) {
                score += 20; // Illegal Geographical Locking
            }
            
            // 3. Monopoly phrasing (Single contract + similar nature + narrow timeframe)
            if (t.includes("single contract") || t.includes("একক চুক্তি") || t.includes("single work")) score += 20;
            if (t.includes("similar nature") || t.includes("সমমনা কাজ")) score += 10;
            if (/(last 1 year|within 12 months|১ বছরের মধ্যে|last 2 years)/i.test(t)) score += 20;
            
            // 4. Equipment/Brand Locking
            if (/(must own|own equipment|specific brand|sole distributor|নিজস্ব|authorization from)/i.test(t)) score += 30;

            // 5. Unrelated Certifications
            if (/(iso 9001|iso|fsc|specific certification)/i.test(t)) score += 15;

            // Threshold: If total suspicion score is 50 or more, flag it as Tailored!
            return score >= 50; 
        }

        // --- DEEP FORENSIC ENGINE ---
        function getDynamicFindings(t) {
            let findings = [];
            let rules = [];

            const fullText = Object.values(t).join(" ").toLowerCase();
            const rReason = (t.Red_Flag_Reason || "").toLowerCase();
            const exp = (t.Extracted_Specific_Experience || t.Eligibility_of_Tenderer || t.Qualification_Criteria || t.Eligibility_Criteria || "").toLowerCase();
            const cpvText = (t.CPV_Code || t.CPV_Category || t.Procurement_Category || "").toLowerCase();
            const pkgNo = (t.Package_No || t.Package_Number || "").toLowerCase();
            
            const sold = parseInt(t.Tenders_Sold);
            const recv = parseInt(t.Tenders_Received);
            const resp = parseInt(t.Responsive_Tenders);
            const val = parseFloat(t.Contract_Value_BDT || t.Contract_Value);
            const est = parseFloat(t.Official_Estimated_Cost || t.Estimated_Cost);

            // 1. Owner info check
            if (/owner|beneficial|গোপন|itt\s*5\.14|missing owner/i.test(fullText) || t.Beneficial_Owner === false || t.Beneficial_Owner === "Missing") {
                findings.push("Beneficial Owner Info Hidden");
                rules.push(...RULE_MAP.owner);
            }

            // 2. Splitting Check
            if (/split|lot|বিভাজন|artificial splitting/i.test(rReason) || /(lot|part|group|sec|phase)[\s\-_]*[a-z0-9]+/i.test(pkgNo)) {
                findings.push("Artificial Contract Splitting (Lot/Part Pattern)");
                rules.push(...RULE_MAP.split);
            }

            // 3. CPV Match Check
            if (/cpv|vocabulary|ক্যাটাগরি|কোড|mismatch/i.test(rReason) || cpvText === "" || cpvText === "not defined" || cpvText.includes("000000") || (cpvText && !/\d/.test(cpvText))) {
                findings.push("CPV Category Manipulated or Hidden");
                rules.push(...RULE_MAP.cpv);
            }

            // 4. Tailored Criteria Check (Using Universal NLP)
            if (analyzeEligibilityAI(exp) || /\d+\.\d+/.test(exp) || /\d{2,}\s*\(/.test(exp) || /restrictive|tailored|নির্দিষ্ট|specific/i.test(fullText)) {
                findings.push("Tailored Eligibility Criteria");
                rules.push(...RULE_MAP.tailored);
            }

            // 5. Monopoly Data Check
            if (resp === 1 || /single|একক|monopoly|50\.6/i.test(fullText)) {
                findings.push("Single Responsive Bidder");
                rules.push(...RULE_MAP.monopoly);
            }

            // 6. Price Outlier Data Check
            if (!isNaN(est) && !isNaN(val) && est > 0 && val > 0 && (Math.abs(est - val) / est > 0.10)) {
                let dev = ((Math.abs(est - val) / est) * 100).toFixed(1);
                findings.push(`Price Outlier (${dev}% deviation from estimate)`);
                rules.push(...RULE_MAP.outlier);
            } else if (/(outlier|abnormal|unusually|alb|below\s*10%|above\s*10%)/i.test(fullText)) {
                findings.push("Price Outlier / Abnormal Bid");
                rules.push(...RULE_MAP.outlier);
            }

            // 7. Pre-Tender Meeting / Rush Job Check
            let isRush = false;
            let isFakeMeeting = false;
            
            let adDate = new Date(t.Advertised_Date || t.Published_Date);
            let closeDate = new Date(t.Tender_Valid_Up_To || t.Closing_Date);
            let meetingDate = new Date(t.Pre_Tender_Meeting_Start_Date || t.Pre_Tender_Start);

            if (!isNaN(adDate)) {
                if (!isNaN(closeDate)) {
                    let diffDays = Math.ceil(Math.abs(closeDate - adDate) / (1000 * 60 * 60 * 24));
                    if (diffDays <= 14) isRush = true; 
                }
                if (!isNaN(meetingDate)) {
                    let meetDiff = Math.ceil(Math.abs(meetingDate - adDate) / (1000 * 60 * 60 * 24));
                    if (meetDiff <= 1) isFakeMeeting = true; 
                }
            }

            if (isFakeMeeting || isRush || /meeting|মিটিং|pre-tender|rush/i.test(fullText)) {
                findings.push(isFakeMeeting ? "Pre-Tender Meeting < 24h of Publish" : (isRush ? "< 14 Days Rush Tender" : "Pre-Tender Process Irregularity"));
                rules.push(...RULE_MAP.meeting);
            }

            // 8. Bid Rigging Data Check
            if ((!isNaN(sold) && !isNaN(recv) && sold > (recv * 1.5) && sold >= 5)) {
                findings.push(`High Dropout Ratio (${sold} sold, only ${recv} dropped)`);
                rules.push(...RULE_MAP.rigging);
            } else if (/rigging|dropout|collusion|কারসাজি/i.test(fullText)) {
                findings.push("Bid Rigging / Collusion Risk");
                rules.push(...RULE_MAP.rigging);
            }

            if (findings.length === 0 && rReason && !['no significant issue detected', 'clean', '-'].includes(rReason)) {
                findings.push(t.Red_Flag_Reason);
            }

            return {
                findingsText: findings.length > 0 ? findings.join(" +<br>") : "-",
                rulesList: rules.length > 0 ? [...new Set(rules)] : ["-"],
                keys: {
                    owner: findings.some(f => /Owner/i.test(f)),
                    split: findings.some(f => /Splitting/i.test(f)),
                    cpv: findings.some(f => /CPV/i.test(f)),
                    tailored: findings.some(f => /Tailored/i.test(f)),
                    monopoly: findings.some(f => /Responsive Bidder/i.test(f)),
                    outlier: findings.some(f => /Outlier/i.test(f)),
                    meeting: findings.some(f => /Meeting|Rush|Irregularity/i.test(f)),
                    rigging: findings.some(f => /Dropout|Rigging/i.test(f))
                }
            };
        }

        async function init() {
            try {
                const res = await fetch(jsonFileName);
                if (!res.ok) throw new Error("File not found");
                const data = await res.json();
                globalTenderData = data.Merged_Database || data; 
                
                filterData(); 
            } catch (err) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="error">ডেটা লোড করা যায়নি। ব্রাউজারের পলিসির কারণে লোকাল ফোল্ডার থেকে JSON রিড করতে সমস্যা হচ্ছে। ফাইলটি লাইভ সার্ভারে ওপেন করুন বা IDE Live Server ব্যবহার করুন।</td></tr>`;
            }
        }

        function filterByRule(ruleKey, element) {
            document.querySelectorAll('.evidence-item').forEach(el => el.classList.remove('active-rule'));
            
            if (activeRuleKey === ruleKey) {
                resetRuleFilter();
                return;
            }

            activeRuleKey = ruleKey;
            element.classList.add('active-rule');

            const banner = document.getElementById('filterBanner');
            const bannerText = document.getElementById('bannerText');
            const ruleName = element.querySelector('strong').innerText.split('<')[0].trim();
            bannerText.innerText = `ফিল্টার অ্যাক্টিভ: শুধুমাত্র "${ruleName}" এর ডেটা অনুসন্ধান করা হচ্ছে`;
            banner.style.display = 'flex';

            filterData(); 
            document.getElementById('filterBanner').scrollIntoView({ behavior: 'smooth' });
        }

        function resetRuleFilter() {
            activeRuleKey = null;
            document.querySelectorAll('.evidence-item').forEach(el => el.classList.remove('active-rule'));
            document.getElementById('filterBanner').style.display = 'none';
            filterData();
        }

        function filterData() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const risk = document.getElementById('riskFilter').value;
            
            const filtered = globalTenderData.filter(t => {
                const matchRisk = risk === 'ALL' || t.Risk_Level === risk;
                const searchString = Object.values(t).join(' ').toLowerCase();
                const matchTerm = searchString.includes(term);
                
                let matchRule = true;
                if (activeRuleKey) {
                    const dynamicFindings = getDynamicFindings(t);
                    matchRule = dynamicFindings.keys[activeRuleKey] === true;
                }

                return matchRisk && matchTerm && matchRule;
            });
            
            updateSummaries(filtered);
            updateAdvancedAnalysis(filtered);
            updateDynamicCharts(filtered);
            updateTable(filtered);
        }

        function formatCurrency(amount) {
            if (!amount) return '-';
            const value = parseFloat(amount);
            if (value >= 10000000) return (value / 10000000).toFixed(2) + ' Cr';
            else if (value >= 100000) return (value / 100000).toFixed(2) + ' L';
            return value.toLocaleString('en-IN');
        }

        function updateSummaries(data) {
            document.getElementById('totalContracts').innerText = data.length;
            
            let highRiskValue = 0;
            let missingOwnerCount = 0;

            data.forEach(t => {
                const f = getDynamicFindings(t);
                if (t.Risk_Level === 'HIGH' && t.Contract_Value_BDT) highRiskValue += parseFloat(t.Contract_Value_BDT);
                if (f.keys.owner) missingOwnerCount++;
            });

            let unit = highRiskValue >= 1000000000 ? (highRiskValue/1000000000).toFixed(2) + " বিলিয়ন" : (highRiskValue/10000000).toFixed(2) + " কোটি";
            document.getElementById('totalValue').innerText = "৳" + unit;
            document.getElementById('totalOwnersMissing').innerText = missingOwnerCount + " টি";
        }

        // --- UNIVERSAL AGENCY NAME EXTRACTOR ---
        function extractCleanAgencyName(agencyString) {
            if(!agencyString) return "Unknown Agency";
            // Removes unnecessary e-GP formatting like "Procuring Entity Name :"
            return agencyString.replace(/Procuring Entity.*/i, '').trim();
        }

        function updateAdvancedAnalysis(data) {
            const nexus = {};
            let tailoredCount = 0;
            let rushCount = 0;

            data.forEach(t => {
                if(t.Supplier_Name && t.Organization_Agency && t.Tender_Status === "Contract Awarded") {
                    let agency = extractCleanAgencyName(t.Organization_Agency);
                    let sup = t.Supplier_Name.split('(')[0].trim();
                    let key = agency + "|||" + sup;
                    if(!nexus[key]) nexus[key] = { agency, sup, count: 0 };
                    nexus[key].count++;
                }

                const f = getDynamicFindings(t);
                if(f.keys.tailored) tailoredCount++;
                if(f.keys.meeting) rushCount++;
            });

            const sortedNexus = Object.values(nexus).sort((a, b) => b.count - a.count).filter(n => n.count > 1).slice(0, 5);
            const nBody = document.getElementById('nexusBody');
            nBody.innerHTML = '';
            if(sortedNexus.length > 0) {
                sortedNexus.forEach(n => {
                    nBody.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td style="color:var(--text-muted);">${n.agency.substring(0,30)}..</td>
                            <td style="font-weight:600;">${n.sup.substring(0,25)}</td>
                            <td><strong>${n.count} বার</strong></td>
                        </tr>
                    `);
                });
            } else {
                nBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color: var(--text-muted);">পর্যাপ্ত ডেটা পাওয়া যায়নি</td></tr>`;
            }

            document.getElementById('tailoredCriteriaCount').innerText = `${tailoredCount} টি টেন্ডার`;
            document.getElementById('rushJobsCount').innerText = `${rushCount} টি টেন্ডার`; 
        }

        function updateDynamicCharts(data) {
            let vCounts = { owner: 0, split: 0, cpv: 0, tailored: 0, monopoly: 0, outlier: 0, meeting: 0, rigging: 0 };
            const reasons = {};

            data.forEach(t => {
                const f = getDynamicFindings(t);
                if (f.keys.owner) vCounts.owner++;
                if (f.keys.split) vCounts.split++;
                if (f.keys.cpv) vCounts.cpv++;
                if (f.keys.tailored) vCounts.tailored++;
                if (f.keys.monopoly) vCounts.monopoly++;
                if (f.keys.outlier) vCounts.outlier++;
                if (f.keys.meeting) vCounts.meeting++;
                if (f.keys.rigging) vCounts.rigging++;

                if(f.findingsText !== "-") {
                    let textClean = f.findingsText.split('+')[0].trim().replace(/<br>/g, "").substring(0, 20);
                    reasons[textClean] = (reasons[textClean] || 0) + 1;
                }
            });

            document.getElementById('count-owner').innerText = vCounts.owner;
            document.getElementById('count-split').innerText = vCounts.split;
            document.getElementById('count-cpv').innerText = vCounts.cpv;
            document.getElementById('count-tailored').innerText = vCounts.tailored;
            document.getElementById('count-monopoly').innerText = vCounts.monopoly;
            document.getElementById('count-outlier').innerText = vCounts.outlier;
            document.getElementById('count-meeting').innerText = vCounts.meeting;
            document.getElementById('count-rigging').innerText = vCounts.rigging;

            if(violationChartObj) violationChartObj.destroy();
            violationChartObj = new Chart(document.getElementById('violationChart'), {
                type: 'bar',
                data: {
                    labels: ['মালিকানা গোপন', 'চুক্তি বিভাজন', 'অবান্তর CPV', 'বৈষম্যমূলক শর্ত', 'একক দরদাতা', 'অস্বাভাবিক দর', 'প্রি-টেন্ডার মিটিং', 'বিড-রিগিং'],
                    datasets: [{ 
                        data: [vCounts.owner, vCounts.split, vCounts.cpv, vCounts.tailored, vCounts.monopoly, vCounts.outlier, vCounts.meeting, vCounts.rigging], 
                        backgroundColor: colorSecondary, borderColor: colorPrimary, borderWidth: 1, borderRadius: 3 
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { display: false }, ticks: {color: '#f8fafc', font: {size: 11}} } }, plugins: { legend: { display: false } } }
            });

            const timeline = {};
            data.forEach(t => {
                let dStr = t.Advertised_Date || t.Contract_Signing_Date;
                if(dStr) {
                    let date = new Date(dStr);
                    if(!isNaN(date)) {
                        let monthYear = `${date.getFullYear()}-${('0'+(date.getMonth()+1)).slice(-2)}`;
                        if(!timeline[monthYear]) timeline[monthYear] = { HIGH: 0, MEDIUM: 0, LOW: 0 };
                        let risk = t.Risk_Level || 'LOW';
                        if(timeline[monthYear][risk] !== undefined) timeline[monthYear][risk]++;
                    }
                }
            });
            
            const sortedDates = Object.keys(timeline).sort();
            if(timelineChartObj) timelineChartObj.destroy();
            timelineChartObj = new Chart(document.getElementById('timelineChart'), {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [
                        { label: 'HIGH', data: sortedDates.map(d => timeline[d].HIGH), borderColor: colorAlert, backgroundColor: 'rgba(220, 38, 38, 0.1)', fill: true, tension: 0.3, pointRadius: 2 },
                        { label: 'MEDIUM', data: sortedDates.map(d => timeline[d].MEDIUM), borderColor: colorAccent, backgroundColor: 'transparent', borderDash: [5, 5], tension: 0.3, pointRadius: 0 },
                        { label: 'LOW', data: sortedDates.map(d => timeline[d].LOW), borderColor: colorSecondary, backgroundColor: 'transparent', tension: 0.3, pointRadius: 0 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false }, ticks: {color: '#f8fafc'} }, y: { display: false } }, plugins: { legend: { display: true, labels: {color: '#f8fafc'} } } }
            });

            let tSold = 0, tRecv = 0, tResp = 0;
            data.forEach(t => {
                if(t.Tenders_Sold && !isNaN(t.Tenders_Sold)) tSold += parseInt(t.Tenders_Sold);
                if(t.Tenders_Received && !isNaN(t.Tenders_Received)) tRecv += parseInt(t.Tenders_Received);
                if(t.Responsive_Tenders && !isNaN(t.Responsive_Tenders)) tResp += parseInt(t.Responsive_Tenders);
            });
            if(dropoutChartObj) dropoutChartObj.destroy();
            dropoutChartObj = new Chart(document.getElementById('dropoutChart'), {
                type: 'bar',
                data: { labels: ['শিডিউল কিনেছে', 'বিড জমা দিয়েছে', 'যোগ্য বিবেচিত'], datasets: [{ data: [tSold, tRecv, tResp], backgroundColor: [colorAlert, colorAccent, colorPrimary], borderRadius: 3 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { grid: { display: false }, ticks: {color: '#f8fafc'} } }, plugins: { legend: { display: false } } }
            });

            const suppliers = {};
            data.forEach(t => {
                if (t.Risk_Level === 'HIGH' && t.Supplier_Name && t.Contract_Value_BDT) {
                    let name = t.Supplier_Name.split('(')[0].trim(); 
                    if(!suppliers[name]) suppliers[name] = 0;
                    suppliers[name] += parseFloat(t.Contract_Value_BDT);
                }
            });
            const sortedSuppliers = Object.entries(suppliers).sort((a, b) => b[1] - a[1]).slice(0, 5);
            if(syndicateChartObj) syndicateChartObj.destroy();
            syndicateChartObj = new Chart(document.getElementById('syndicateChart'), {
                type: 'bar',
                data: { labels: sortedSuppliers.map(s => s[0].length > 15 ? s[0].substring(0, 15) + ".." : s[0]), datasets: [{ data: sortedSuppliers.map(s => s[1]), backgroundColor: colorAlert, borderRadius: 3 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { display: false }, ticks: {color: '#f8fafc', font: {weight: 'bold'}} } }, plugins: { legend: { display: false } } }
            });

            let highCount = 0, medCount = 0, lowCount = 0;
            data.forEach(t => {
                if(t.Risk_Level === 'HIGH') highCount++; else if(t.Risk_Level === 'MEDIUM') medCount++; else if(t.Risk_Level === 'LOW') lowCount++;
            });
            if(riskPieChartObj) riskPieChartObj.destroy();
            riskPieChartObj = new Chart(document.getElementById('riskPieChart'), {
                type: 'doughnut',
                data: { labels: ['HIGH', 'MEDIUM', 'LOW'], datasets: [{ data: [highCount, medCount, lowCount], backgroundColor: [colorAlert, colorAccent, colorSecondary], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: {font: {size: 11}, color: '#f8fafc'} } } }
            });

            const agencies = {};
            data.forEach(t => {
                if (t.Risk_Level === 'HIGH' && t.Organization_Agency && t.Contract_Value_BDT) {
                    let name = extractCleanAgencyName(t.Organization_Agency);
                    if(!agencies[name]) agencies[name] = 0;
                    agencies[name] += parseFloat(t.Contract_Value_BDT);
                }
            });
            const sortedAgencies = Object.entries(agencies).sort((a, b) => b[1] - a[1]).slice(0, 5);
            if(agencyChartObj) agencyChartObj.destroy();
            agencyChartObj = new Chart(document.getElementById('agencyChart'), {
                type: 'bar',
                data: { labels: sortedAgencies.map(s => s[0].length > 20 ? s[0].substring(0, 20) + ".." : s[0]), datasets: [{ data: sortedAgencies.map(s => s[1]), backgroundColor: colorSecondary, borderColor: colorPrimary, borderWidth: 1, borderRadius: 3 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { display: false }, ticks: {color: '#f8fafc'} } }, plugins: { legend: { display: false } } }
            });

            const sortedReasons = Object.entries(reasons).sort((a, b) => b[1] - a[1]).slice(0, 5);
            if(redFlagChartObj) redFlagChartObj.destroy();
            redFlagChartObj = new Chart(document.getElementById('redFlagChart'), {
                type: 'bar',
                data: { labels: sortedReasons.map(r => r[0] + ".."), datasets: [{ data: sortedReasons.map(r => r[1]), backgroundColor: colorAccent, borderRadius: 3 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { display: false }, ticks: {font: {size: 10}, color: '#f8fafc'} } }, plugins: { legend: { display: false } } }
            });

            let single = vCounts.monopoly;
            let multiple = data.length - single;
            if(singleBidderChartObj) singleBidderChartObj.destroy();
            singleBidderChartObj = new Chart(document.getElementById('singleBidderChart'), {
                type: 'doughnut',
                data: { labels: ['১ জন যোগ্য', 'একাধিক যোগ্য'], datasets: [{ data: [single, multiple], backgroundColor: [colorAlert, colorSecondary], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: {font: {size: 11}, color: '#f8fafc'} } } }
            });

            let hVal = 0, mVal = 0, lVal = 0;
            data.forEach(t => {
                let val = parseFloat(t.Contract_Value_BDT) || 0;
                if(t.Risk_Level === 'HIGH') hVal += val; else if(t.Risk_Level === 'MEDIUM') mVal += val; else if(t.Risk_Level === 'LOW') lVal += val;
            });
            if(riskValuePieChartObj) riskValuePieChartObj.destroy();
            riskValuePieChartObj = new Chart(document.getElementById('riskValuePieChart'), {
                type: 'pie',
                data: { labels: ['HIGH (৳)', 'MEDIUM (৳)', 'LOW (৳)'], datasets: [{ data: [hVal, mVal, lVal], backgroundColor: [colorAlert, colorAccent, colorSecondary], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: {font: {size: 11}, color: '#f8fafc'} } } }
            });
        }

        function updateTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 
            if(!data.length) return tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 20px; color: var(--text-muted);">No records found.</td></tr>`;
            
            const riskOrder = { "HIGH": 1, "MEDIUM": 2, "LOW": 3 };
            const sortedData = [...data].sort((a, b) => (riskOrder[a.Risk_Level] || 4) - (riskOrder[b.Risk_Level] || 4));

            sortedData.forEach(t => {
                let riskClass = t.Risk_Level === 'HIGH' ? 'risk-high' : (t.Risk_Level === 'MEDIUM' ? 'risk-medium' : 'risk-low');
                let valStr = formatCurrency(t.Contract_Value_BDT);
                
                let org = extractCleanAgencyName(t.Organization_Agency);
                let sup = t.Supplier_Name ? t.Supplier_Name.split('(')[0].trim() : "<span style='color:var(--text-muted)'>-</span>";
                
                const f = getDynamicFindings(t);
                let reason = f.findingsText;
                let rulesHtml = f.rulesList.join("<br>");
                
                let pdfHtml = '';
                if (t.Source_Files_Merged) {
                    t.Source_Files_Merged.split('|').filter(f => f.trim()).forEach((file, i) => {
                        let isNoa = i > 0;
                        pdfHtml += `<a href="downloaded_pdfs/${file.trim()}" target="_blank" class="doc-link ${isNoa ? 'noa' : ''}">${isNoa ? 'NOA 📄' : 'Notice 📄'}</a>`;
                    });
                } else if(t.Source_File) {
                    pdfHtml = `<a href="downloaded_pdfs/${t.Source_File.trim()}" target="_blank" class="doc-link">Notice 📄</a>`;
                } else {
                    pdfHtml = '-';
                }

                tbody.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td style="font-family: monospace; font-weight: bold; color: var(--neon-blue);">${t.Tender_Proposal_ID}</td>
                        <td style="color: #cbd5e1;">${org}</td>
                        <td style="font-weight: bold; color: #fff;">${sup}</td>
                        <td><span class="risk-badge ${riskClass}">${t.Risk_Level||'N/A'}</span></td>
                        <td style="text-align: right; font-family: monospace; font-weight: bold; color: #fff;">${valStr}</td>
                        <td style="font-size: 12px; color: #fca5a5; line-height: 1.4;">${reason}</td>
                        <td style="font-size: 11.5px; color: #38bdf8; font-weight: 600; line-height: 1.4;">${rulesHtml}</td>
                        <td>${pdfHtml}</td>
                    </tr>
                `);
            });
        }

        function downloadCSV() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const risk = document.getElementById('riskFilter').value;
            
            const dataToExport = globalTenderData.filter(t => {
                const matchRisk = risk === 'ALL' || t.Risk_Level === risk;
                const searchString = Object.values(t).join(' ').toLowerCase();
                return matchRisk && searchString.includes(term);
            });
            
            if(!dataToExport.length) return alert("No data available to export.");

            let csv = "\uFEFF" + "Tender_ID,Agency,Supplier,Risk,Value_BDT,Detected_Findings,Violated_Rules\n";
            
            dataToExport.forEach(r => {
                const f = getDynamicFindings(r);
                
                const escAgency = extractCleanAgencyName(r.Organization_Agency).replace(/"/g, '""');
                const escSupplier = (r.Supplier_Name || "").replace(/"/g, '""');
                const escReason = f.findingsText.replace(/<br>/g, " ").replace(/"/g, '""');
                const escRules = f.rulesList.join(" | ").replace(/"/g, '""');

                csv += `${r.Tender_Proposal_ID},"${escAgency}","${escSupplier}",${r.Risk_Level || "N/A"},${r.Contract_Value_BDT || 0},"${escReason}","${escRules}"\n`;
            });

            const link = document.createElement("a");
            link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
            link.download = "eGP_Forensic_Audit_Data_All_Authorities.csv";
            link.click();
        }

        init();
    </script>
